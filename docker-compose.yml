version: '3.9'

services:
  nf-extractor-api:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: nf-extractor-api
    
    ports:
      - "9001:9001"
    
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEBUG=${DEBUG:-false}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    
    volumes:
      - ./nf-agent-telecontrol:/app/nf-agent-telecontrol
    
    depends_on:
      - redis
    
    # Reiniciar automático
    restart: unless-stopped
    
    # Configuração de recursos
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Healthcheck já definido no Dockerfile
    # Aqui podemos adicionar configurações adicionais se necessário

  redis:
    image: redis:alpine
    container_name: nf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:

networks:
  default:
    name: nf-network
    driver: bridge
